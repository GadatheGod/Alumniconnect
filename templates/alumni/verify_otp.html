{% extends 'base.html' %}
{% block title %}Verify OTP - {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-envelope-open-text mb-3" style="font-size:3rem; color: #901d78;"></i>
                    <h3>Verify Your Email</h3>
                    <p class="text-muted">We sent a 6-digit OTP to <strong>{{ email }}</strong></p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Enter OTP Code</label>
                        <input type="text" name="otp_code" class="form-control text-center" placeholder="Enter 6-digit code" maxlength="6" pattern="[0-9]{6}" required style="font-size:1.5rem; letter-spacing:0.5rem;">
                        <small class="text-muted d-block mt-2">OTP expires in 10 minutes</small>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-pcet btn-lg px-5"><i class="fas fa-check-circle"></i> Verify & Register</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'register' %}" class="btn btn-link">Resend OTP</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
