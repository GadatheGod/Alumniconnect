{% extends 'base.html' %}
{% block title %}Login - {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-sign-in-alt mb-3" style="font-size:3rem; color: #901d78;"></i>
                    <h3>Login to {{ SITE_NAME }}</h3>
                    <p class="text-muted">Enter your registered email to receive OTP</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" value="{{ email|default:'' }}" placeholder="your@email.com" required>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-pcet btn-lg px-5"><i class="fas fa-paper-plane"></i> Send OTP</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="text-muted">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
