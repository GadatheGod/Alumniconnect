{% extends 'base.html' %}
{% block title %}Post a Job - {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h4 class="mb-4"><i class="fas fa-plus-circle"></i> Post a Job</h4>
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Job Title *</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Company *</label>
                            <input type="text" name="company" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Location *</label>
                            <input type="text" name="location" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Job Type *</label>
                            <select name="job_type" class="form-select" required>
                                <option value="">Select Type</option>
                                <option value="full-time">Full Time</option>
                                <option value="part-time">Part Time</option>
                                <option value="remote">Remote</option>
                                <option value="internship">Internship</option>
                                <option value="contract">Contract</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Salary Range</label>
                            <input type="text" name="salary_range" class="form-control" placeholder="e.g., 5-10 LPA">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Application Email</label>
                            <input type="email" name="application_email" class="form-control" placeholder="hr@company.com">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Job Description *</label>
                            <textarea name="description" class="form-control" rows="5" required placeholder="Describe the role, responsibilities, and what you're looking for..."></textarea>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Requirements</label>
                            <textarea name="requirements" class="form-control" rows="3" placeholder="Required skills, experience, qualifications..."></textarea>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Application Link</label>
                            <input type="url" name="application_link" class="form-control" placeholder="https://company.com/apply">
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-pcet btn-lg px-5"><i class="fas fa-paper-plane"></i> Post Job</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
